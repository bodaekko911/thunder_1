services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: change-this-to-a-long-random-secret-key
      DATABASE_URL: postgresql+asyncpg://erp:erp@postgres:5432/erp
      ADMIN_PASSWORD: change-me-now
      DEFAULT_ADMIN_NAME: Administrator
      DEFAULT_ADMIN_EMAIL: admin@example.com
      APP_ENV: production
      LOG_LEVEL: INFO
      COOKIE_SECURE: "false"
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://localhost:8000
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
